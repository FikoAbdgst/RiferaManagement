name: Deploy Next.js to cPanel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24.11.0' # Sesuaikan dengan versi Node kamu
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build
        # Pastikan di next.config.js kamu sudah set output: 'export'

      - name: 📂 Sync Files via FTP
        uses: Samkirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Folder 'out' adalah hasil build static Next.js
          port: 21
          local-dir: ./out/ 
          server-dir: public_html/